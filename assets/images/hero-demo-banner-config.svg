<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="hdr2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="pc2">
      <rect x="20" y="20" width="680" height="420" rx="12"/>
    </clipPath>
  </defs>

  <rect x="20" y="20" width="680" height="420" rx="12" fill="url(#bg2)" filter="url(#sh2)"/>
  <rect x="20" y="20" width="680" height="48" fill="url(#hdr2)" clip-path="url(#pc2)"/>
  <rect x="20" y="20" width="680" height="12" rx="12" fill="url(#hdr2)"/>
  <circle cx="48" cy="44" r="5" fill="#ff5f56" opacity="0.9"/>
  <circle cx="66" cy="44" r="5" fill="#ffbd2e" opacity="0.9"/>
  <circle cx="84" cy="44" r="5" fill="#27c93f" opacity="0.9"/>
  <text x="115" y="49" font-family="'Inter', sans-serif" font-size="13" fill="white" font-weight="600">PrivacyCrumb — Banner Configuration</text>

  <!-- Left setup panel -->
  <rect x="36" y="80" width="280" height="340" rx="8" fill="#161d2c"/>
  <text x="52" y="104" font-family="sans-serif" font-size="11" fill="#a5b4fc" font-weight="600">BANNER SETTINGS</text>

  <!-- Theme toggle -->
  <text x="52" y="128" font-family="sans-serif" font-size="10" fill="#6b7280">Theme</text>
  <text x="52" y="148" font-family="sans-serif" font-size="11" fill="#e2e8f0">Dark Mode</text>
  <rect x="224" y="136" width="40" height="20" rx="10" fill="#6366f1"/>
  <circle cx="254" cy="146" r="8" fill="white"/>

  <!-- Position select -->
  <text x="52" y="178" font-family="sans-serif" font-size="10" fill="#6b7280">Position</text>
  <rect x="52" y="184" width="248" height="26" rx="6" fill="#1e2433"/>
  <text x="66" y="200" font-family="sans-serif" font-size="11" fill="#e2e8f0">Bottom Banner ▾</text>

  <!-- Language select -->
  <text x="52" y="228" font-family="sans-serif" font-size="10" fill="#6b7280">Auto Language</text>
  <rect x="52" y="234" width="248" height="26" rx="6" fill="#1e2433"/>
  <text x="66" y="250" font-family="sans-serif" font-size="11" fill="#e2e8f0">Browser Locale ▾</text>

  <!-- Consent categories section -->
  <text x="52" y="282" font-family="sans-serif" font-size="10" fill="#6b7280">CONSENT CATEGORIES</text>
  <!-- Necessary (forced on) -->
  <rect x="52" y="292" width="248" height="30" rx="6" fill="#1a2036"/>
  <text x="68" y="310" font-family="sans-serif" font-size="11" fill="#e2e8f0">Necessary</text>
  <rect x="268" y="300" width="28" height="15" rx="7" fill="#22c55e" opacity="0.4"/>
  <text x="282" y="311" font-family="sans-serif" font-size="8" fill="#6b7280" text-anchor="middle">ON</text>
  <!-- Analytics toggle -->
  <rect x="52" y="328" width="248" height="30" rx="6" fill="#1a2036"/>
  <text x="68" y="346" font-family="sans-serif" font-size="11" fill="#e2e8f0">Analytics</text>
  <rect x="268" y="336" width="28" height="15" rx="7" fill="#6366f1"/>
  <circle cx="288" cy="343" r="6" fill="white"/>
  <!-- Marketing toggle -->
  <rect x="52" y="364" width="248" height="30" rx="6" fill="#1a2036"/>
  <text x="68" y="382" font-family="sans-serif" font-size="11" fill="#e2e8f0">Marketing</text>
  <rect x="268" y="372" width="28" height="15" rx="7" fill="#1e2433"/>
  <circle cx="274" cy="379" r="6" fill="#6b7280"/>

  <!-- Right preview panel -->
  <rect x="330" y="80" width="354" height="340" rx="8" fill="#161d2c"/>
  <text x="346" y="104" font-family="sans-serif" font-size="11" fill="#a5b4fc" font-weight="600">LIVE PREVIEW</text>

  <!-- Mock browser window -->
  <rect x="346" y="114" width="322" height="200" rx="6" fill="#1e2433"/>
  <!-- Browser chrome -->
  <rect x="346" y="114" width="322" height="24" rx="6" fill="#252d3d"/>
  <rect x="352" y="120" width="200" height="12" rx="6" fill="#1a1f2e"/>
  <text x="368" y="130" font-family="sans-serif" font-size="8" fill="#6b7280">https://yoursite.com/page</text>
  <!-- Mock website content -->
  <rect x="352" y="140" width="310" height="70" rx="4" fill="#12172a"/>
  <rect x="360" y="148" width="120" height="8" rx="2" fill="#252d3d"/>
  <rect x="360" y="162" width="200" height="6" rx="2" fill="#1e2433"/>
  <rect x="360" y="174" width="170" height="6" rx="2" fill="#1e2433"/>
  <rect x="360" y="186" width="190" height="6" rx="2" fill="#1e2433"/>
  <!-- Cookie Banner overlay -->
  <rect x="352" y="220" width="310" height="86" rx="4" fill="#0f172a"/>
  <rect x="352" y="220" width="310" height="3" rx="0" fill="#6366f1"/>
  <text x="366" y="238" font-family="sans-serif" font-size="9" fill="#e2e8f0" font-weight="600">We use cookies to enhance your experience</text>
  <text x="366" y="252" font-family="sans-serif" font-size="8" fill="#6b7280">Select which categories you consent to.</text>
  <text x="366" y="264" font-family="sans-serif" font-size="8" fill="#6b7280">Your data, your choice.</text>
  <!-- Buttons row -->
  <rect x="366" y="274" width="80" height="22" rx="11" fill="#6366f1"/>
  <text x="406" y="289" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">Accept All</text>
  <rect x="458" y="274" width="80" height="22" rx="11" fill="rgba(255,255,255,0.1)"/>
  <text x="498" y="289" font-family="sans-serif" font-size="9" fill="#9ca3af" text-anchor="middle">Manage</text>
  <rect x="550" y="274" width="60" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
  <text x="580" y="289" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Reject</text>

  <!-- Stats row under preview -->
  <rect x="346" y="326" width="96" height="60" rx="6" fill="#1a2036"/>
  <text x="394" y="346" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Translations</text>
  <text x="394" y="366" font-family="sans-serif" font-size="18" fill="#6366f1" font-weight="800" text-anchor="middle">42</text>
  <text x="394" y="380" font-family="sans-serif" font-size="8" fill="#4b5563" text-anchor="middle">languages</text>

  <rect x="453" y="326" width="96" height="60" rx="6" fill="#1a2036"/>
  <text x="501" y="346" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Regulations</text>
  <text x="501" y="366" font-family="sans-serif" font-size="18" fill="#22c55e" font-weight="800" text-anchor="middle">12</text>
  <text x="501" y="380" font-family="sans-serif" font-size="8" fill="#4b5563" text-anchor="middle">frameworks</text>

  <rect x="560" y="326" width="96" height="60" rx="6" fill="#1a2036"/>
  <text x="608" y="346" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Setup Time</text>
  <text x="608" y="366" font-family="sans-serif" font-size="18" fill="#f59e0b" font-weight="800" text-anchor="middle">&lt;5m</text>
  <text x="608" y="380" font-family="sans-serif" font-size="8" fill="#4b5563" text-anchor="middle">to deploy</text>
</svg>
